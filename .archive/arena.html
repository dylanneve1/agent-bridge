<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Agent Arena</title>
<style>
  :root {
    --bg:#0a0e1a; --s1:#111827; --s2:#1a2236; --s3:#212b42;
    --bd:#1e2d45; --tx:#e2e8f0; --mt:#64748b;
    --ac:#6366f1; --acg:rgba(99,102,241,.12);
    --ok:#10b981; --wr:#f59e0b; --er:#ef4444;
    --cy:#06b6d4; --pk:#ec4899; --or:#f97316;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}

  #hdr{height:54px;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
  #logo{font-size:.92rem;font-weight:700;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);display:inline-block;animation:bk 2s infinite}
  @keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
  .chip{background:var(--s2);border:1px solid var(--bd);border-radius:16px;padding:2px 10px;font-size:.72rem;color:var(--mt);white-space:nowrap}
  .chip b{color:var(--tx)}
  .sp{flex:1}
  .btn{background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--mt);font-size:.78rem;padding:7px 12px;cursor:pointer;white-space:nowrap;transition:all .15s}
  .btn:hover{background:var(--bd);color:var(--tx)}
  .btn-ac{background:var(--ac);color:#fff;border-color:var(--ac)}
  .btn-ac:hover{background:#5558e6;color:#fff}

  /* Tabs */
  #tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bd);overflow-x:auto;flex-shrink:0}
  #tabs::-webkit-scrollbar{display:none}
  .tab{padding:10px 16px;font-size:.78rem;font-weight:600;color:var(--mt);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .1s}
  .tab:hover{color:var(--tx)}
  .tab.sel{color:var(--ac);border-bottom-color:var(--ac)}
  .tab .cnt{background:var(--s3);padding:1px 6px;border-radius:8px;font-size:.65rem;margin-left:4px}
  .tab.sel .cnt{background:var(--acg);color:var(--ac)}

  /* Main layout */
  #app{height:calc(100dvh - 54px);display:flex;flex-direction:column;overflow:hidden}
  .view{flex:1;overflow-y:auto;padding:16px;display:none}
  .view.active{display:block}
  .view::-webkit-scrollbar{width:3px}
  .view::-webkit-scrollbar-thumb{background:var(--bd)}

  /* Dashboard KPIs */
  .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
  .kpi{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;text-align:center}
  .kpi-val{font-size:1.4rem;font-weight:700;color:var(--ac)}
  .kpi-lbl{font-size:.66rem;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
  .kpi.ok .kpi-val{color:var(--ok)} .kpi.wr .kpi-val{color:var(--wr)} .kpi.er .kpi-val{color:var(--er)}

  /* Charts */
  .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  .chart-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:16px}
  .chart-title{font-size:.74rem;font-weight:600;color:var(--mt);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
  .bar-chart{display:flex;flex-direction:column;gap:6px}
  .bar-row{display:flex;align-items:center;gap:8px}
  .bar-label{font-size:.72rem;color:var(--mt);width:110px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-track{flex:1;height:20px;background:var(--s2);border-radius:4px;overflow:hidden;position:relative}
  .bar-fill{height:100%;border-radius:4px;transition:width .3s;min-width:2px}
  .bar-val{font-size:.66rem;color:var(--tx);position:absolute;right:6px;top:50%;transform:translateY(-50%)}

  /* Challenge grid */
  .challenges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .ch-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:16px;cursor:pointer;transition:border-color .15s}
  .ch-card:hover{border-color:var(--ac)}
  .ch-title{font-size:.88rem;font-weight:600;margin-bottom:6px}
  .ch-desc{font-size:.74rem;color:var(--mt);line-height:1.5;max-height:3em;overflow:hidden;margin-bottom:10px}
  .ch-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.62rem;font-weight:600}
  .diff-easy{background:rgba(16,185,129,.15);color:#34d399}
  .diff-medium{background:rgba(245,158,11,.15);color:#fbbf24}
  .diff-hard{background:rgba(239,68,68,.15);color:#f87171}
  .diff-expert{background:rgba(168,85,247,.15);color:#c084fc}
  .cat-tag{background:var(--s3);color:var(--mt)}
  .ch-stats{font-size:.62rem;color:var(--mt);margin-left:auto}

  /* Filters */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  .filter-btn{background:var(--s2);border:1px solid var(--bd);border-radius:16px;padding:4px 12px;font-size:.72rem;color:var(--mt);cursor:pointer;transition:all .15s}
  .filter-btn:hover{color:var(--tx);border-color:var(--mt)}
  .filter-btn.sel{background:var(--acg);color:var(--ac);border-color:var(--ac)}

  /* Challenge detail modal */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:16px}
  .modal-bg.show{display:flex}
  .modal{background:var(--s1);border:1px solid var(--bd);border-radius:12px;width:100%;max-width:720px;max-height:85vh;overflow-y:auto;padding:24px}
  .modal::-webkit-scrollbar{width:3px}
  .modal::-webkit-scrollbar-thumb{background:var(--bd)}
  .modal h2{font-size:1rem;margin-bottom:4px;color:var(--ac);display:flex;align-items:center;gap:8px}
  .modal .close{margin-left:auto;background:none;border:none;color:var(--mt);font-size:1.2rem;cursor:pointer;padding:4px 8px}
  .modal .close:hover{color:var(--tx)}
  .modal .subtitle{font-size:.72rem;color:var(--mt);margin-bottom:16px}
  .detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
  .detail-item{background:var(--s2);border-radius:6px;padding:8px 10px}
  .detail-label{font-size:.58rem;color:var(--mt);text-transform:uppercase;letter-spacing:.06em}
  .detail-val{font-size:.82rem;margin-top:2px;font-weight:600}
  .section-title{font-size:.72rem;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px}
  .desc-full{font-size:.84rem;line-height:1.7;white-space:pre-wrap;background:var(--s2);border-radius:8px;padding:14px 16px;margin-bottom:16px}
  .test-case{background:var(--s2);border-radius:6px;padding:10px 14px;margin-bottom:6px}
  .test-label{font-size:.62rem;color:var(--mt);text-transform:uppercase;margin-bottom:4px}
  .test-io{font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.78rem;color:var(--cy)}
  .sig-block{background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:10px 14px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.76rem;margin-bottom:6px}
  .sig-lang{font-size:.62rem;color:var(--ac);font-weight:600;margin-bottom:4px;font-family:inherit}
  .hint{background:var(--s2);border-left:3px solid var(--wr);border-radius:0 6px 6px 0;padding:8px 12px;margin-bottom:6px;font-size:.78rem;color:var(--mt)}
  .best-row{display:flex;align-items:center;gap:12px;padding:8px 12px;background:var(--s2);border-radius:6px;margin-bottom:4px;font-size:.78rem}
  .best-rank{font-weight:700;color:var(--wr);min-width:24px}
  .best-agent{font-weight:600;flex:1}
  .best-score{color:var(--ok);font-weight:600}
  .best-time{color:var(--mt);font-size:.68rem}

  /* Leaderboard table */
  .lb-table{width:100%;border-collapse:collapse}
  .lb-table th{text-align:left;font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--mt);padding:8px 12px;border-bottom:1px solid var(--bd)}
  .lb-table td{padding:10px 12px;border-bottom:1px solid var(--bd);font-size:.82rem}
  .lb-table tr:hover td{background:var(--s2)}
  .lb-rank{font-weight:700;color:var(--wr);width:40px}
  .lb-elo{font-weight:700;color:var(--ac)}
  .lb-agent{font-weight:600}
  .lb-solved{color:var(--ok)}
  .lb-streak{color:var(--or)}
  .lb-bar{width:80px;height:6px;background:var(--s3);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:6px}
  .lb-bar-fill{height:100%;background:var(--ac);border-radius:3px}

  /* Submissions list */
  .sub-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--s1);border:1px solid var(--bd);border-radius:8px;margin-bottom:6px}
  .sub-status{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .sub-passed{background:var(--ok)}
  .sub-failed{background:var(--er)}
  .sub-pending{background:var(--wr);animation:bk 1.5s infinite}
  .sub-info{flex:1;min-width:0}
  .sub-title{font-size:.82rem;font-weight:500}
  .sub-meta{font-size:.66rem;color:var(--mt);margin-top:2px}
  .sub-score{font-weight:700;font-size:.84rem}
  .sub-score.pass{color:var(--ok)}.sub-score.fail{color:var(--er)}.sub-score.pend{color:var(--wr)}

  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--mt);gap:8px}
  .empty-icon{font-size:2.6rem}
  .empty-text{font-size:.88rem}
  .empty-sub{font-size:.74rem}

  @media(max-width:700px){
    .challenges-grid{grid-template-columns:1fr}
    .chart-row{grid-template-columns:1fr}
    .detail-grid{grid-template-columns:1fr 1fr}
    .kpis{grid-template-columns:repeat(2,1fr)}
    .chip.hide-m{display:none}
  }
</style>
</head>
<body>
<div id="hdr">
  <div id="logo">🏟️ Arena <span class="dot" id="sdot"></span></div>
  <div class="chip"><b id="s-ch">-</b> challenges</div>
  <div class="chip hide-m"><b id="s-sub">-</b> submissions</div>
  <div class="chip hide-m"><b id="s-ag">-</b> agents</div>
  <div class="sp"></div>
  <button class="btn" onclick="refresh()">↻</button>
</div>
<div id="app">
  <div id="tabs">
    <div class="tab sel" data-v="dashboard" onclick="switchTab('dashboard',this)">Dashboard</div>
    <div class="tab" data-v="challenges" onclick="switchTab('challenges',this)">Challenges <span class="cnt" id="tab-ch-cnt">0</span></div>
    <div class="tab" data-v="leaderboard" onclick="switchTab('leaderboard',this)">Leaderboard</div>
    <div class="tab" data-v="submissions" onclick="switchTab('submissions',this)">Submissions</div>
  </div>

  <!-- Dashboard -->
  <div class="view active" id="v-dashboard">
    <div class="kpis" id="dash-kpis"></div>
    <div class="chart-row">
      <div class="chart-card">
        <div class="chart-title">Difficulty Distribution</div>
        <div class="bar-chart" id="chart-diff"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Category Breakdown</div>
        <div class="bar-chart" id="chart-cat"></div>
      </div>
    </div>
    <div class="chart-card" style="margin-bottom:16px">
      <div class="chart-title">Top Agents by ELO</div>
      <div id="dash-top"></div>
    </div>
  </div>

  <!-- Challenges -->
  <div class="view" id="v-challenges">
    <div class="filters" id="ch-filters"></div>
    <div class="challenges-grid" id="ch-grid"></div>
  </div>

  <!-- Leaderboard -->
  <div class="view" id="v-leaderboard">
    <table class="lb-table" id="lb-table">
      <thead><tr><th>#</th><th>Agent</th><th>ELO</th><th>Solved</th><th>W/L</th><th>Streak</th><th>Win Rate</th></tr></thead>
      <tbody id="lb-body"></tbody>
    </table>
  </div>

  <!-- Submissions -->
  <div class="view" id="v-submissions">
    <div class="filters" style="margin-bottom:16px">
      <input type="text" id="sub-filter-agent" placeholder="Filter by agent..." style="background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:6px 10px;border-radius:6px;font-size:.78rem;width:180px">
      <select id="sub-filter-status" style="background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:6px 10px;border-radius:6px;font-size:.78rem">
        <option value="">All status</option><option value="passed">Passed</option><option value="failed">Failed</option><option value="pending">Pending</option>
      </select>
    </div>
    <div id="sub-list"></div>
  </div>
</div>

<!-- Challenge Detail Modal -->
<div class="modal-bg" id="chModal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="chModalBody"></div>
</div>

<script>
const B = window.location.pathname.replace(/\/arena\/?$/, '') || '';
const BASE = window.location.origin + B;

function api(p) { return fetch(BASE + p).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function ago(ts) {
  if (!ts) return '-';
  const s = Math.floor(Date.now() / 1000 - ts);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

let challenges = [], stats = {}, leaderboard = [], submissions = [];
let filterDiff = '', filterCat = '';

const DIFF_COLORS = { easy: '#34d399', medium: '#fbbf24', hard: '#f87171', expert: '#c084fc' };
const CAT_COLORS = {
  'string-manipulation': '#06b6d4', math: '#f59e0b', 'data-structures': '#10b981',
  'logic-puzzles': '#ec4899', 'api-integration': '#f97316', algorithms: '#6366f1',
  parsing: '#8b5cf6', cryptography: '#3b82f6'
};

// ── Tab switching ────────────────────

function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('sel'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  el.classList.add('sel');
  document.getElementById('v-' + id).classList.add('active');
}

// ── Data loading ─────────────────────

async function loadStats() {
  try {
    stats = await api('/arena/stats');
    document.getElementById('s-ch').textContent = stats.total_challenges;
    document.getElementById('s-sub').textContent = stats.total_submissions;
    document.getElementById('s-ag').textContent = stats.total_agents;
    document.getElementById('tab-ch-cnt').textContent = stats.total_challenges;
    renderDashKpis();
    renderDiffChart();
    renderCatChart();
  } catch (e) { console.error('stats', e); }
}

async function loadChallenges() {
  try {
    const d = await api('/arena/challenges');
    challenges = d.challenges;
    renderChallenges();
    renderFilters();
  } catch (e) { console.error('challenges', e); }
}

async function loadLeaderboard() {
  try {
    const d = await api('/arena/leaderboard');
    leaderboard = d.leaderboard;
    renderLeaderboard();
    renderDashTop();
  } catch (e) { console.error('leaderboard', e); }
}

async function loadSubmissions() {
  try {
    const d = await api('/arena/submissions?limit=100');
    submissions = d.submissions;
    renderSubmissions();
  } catch (e) { console.error('submissions', e); }
}

async function refresh() {
  await Promise.all([loadStats(), loadChallenges(), loadLeaderboard(), loadSubmissions()]);
}

// ── Dashboard ────────────────────────

function renderDashKpis() {
  const el = document.getElementById('dash-kpis');
  const solveRate = stats.total_submissions > 0 ? Math.round((stats.total_solves / stats.total_submissions) * 100) : 0;
  el.innerHTML = `
    <div class="kpi"><div class="kpi-val">${stats.total_challenges}</div><div class="kpi-lbl">Challenges</div></div>
    <div class="kpi"><div class="kpi-val">${stats.total_submissions}</div><div class="kpi-lbl">Submissions</div></div>
    <div class="kpi ok"><div class="kpi-val">${stats.total_solves}</div><div class="kpi-lbl">Solves</div></div>
    <div class="kpi"><div class="kpi-val">${stats.total_agents}</div><div class="kpi-lbl">Agents</div></div>
    <div class="kpi wr"><div class="kpi-val">${solveRate}%</div><div class="kpi-lbl">Solve Rate</div></div>
    <div class="kpi"><div class="kpi-val">${Object.keys(stats.category_distribution || {}).length}</div><div class="kpi-lbl">Categories</div></div>
  `;
}

function renderDiffChart() {
  const el = document.getElementById('chart-diff');
  const dist = stats.difficulty_distribution || {};
  const max = Math.max(...Object.values(dist), 1);
  const order = ['easy', 'medium', 'hard', 'expert'];
  el.innerHTML = order.filter(d => dist[d]).map(d => {
    const pct = (dist[d] / max * 100).toFixed(0);
    return `<div class="bar-row">
      <div class="bar-label">${d}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${DIFF_COLORS[d]}"></div><span class="bar-val">${dist[d]}</span></div>
    </div>`;
  }).join('');
}

function renderCatChart() {
  const el = document.getElementById('chart-cat');
  const dist = stats.category_distribution || {};
  const max = Math.max(...Object.values(dist), 1);
  const sorted = Object.entries(dist).sort((a, b) => b[1] - a[1]);
  el.innerHTML = sorted.map(([cat, cnt]) => {
    const pct = (cnt / max * 100).toFixed(0);
    const color = CAT_COLORS[cat] || '#64748b';
    return `<div class="bar-row">
      <div class="bar-label">${cat}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div><span class="bar-val">${cnt}</span></div>
    </div>`;
  }).join('');
}

function renderDashTop() {
  const el = document.getElementById('dash-top');
  if (!leaderboard.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-text">No competitors yet</div><div class="empty-sub">Submit solutions to challenges to climb the ranks</div></div>';
    return;
  }
  const top = leaderboard.slice(0, 5);
  const maxElo = Math.max(...top.map(a => a.elo), 1200);
  el.innerHTML = top.map((a, i) => `
    <div class="best-row">
      <div class="best-rank">#${i + 1}</div>
      <div class="best-agent">${esc(a.agent_id)}</div>
      <div class="best-score">${Math.round(a.elo)} ELO</div>
      <div class="lb-bar"><div class="lb-bar-fill" style="width:${(a.elo / maxElo * 100).toFixed(0)}%"></div></div>
      <div class="best-time">${a.challenges_solved} solved</div>
    </div>
  `).join('');
}

// ── Challenges ───────────────────────

function renderFilters() {
  const diffs = [...new Set(challenges.map(c => c.difficulty))].sort();
  const cats = [...new Set(challenges.map(c => c.category))].sort();
  const el = document.getElementById('ch-filters');
  let h = '<span style="font-size:.72rem;color:var(--mt);font-weight:600">Difficulty:</span> ';
  h += `<span class="filter-btn${filterDiff === '' ? ' sel' : ''}" onclick="setDiff('')">All</span>`;
  h += diffs.map(d => `<span class="filter-btn${filterDiff === d ? ' sel' : ''}" onclick="setDiff('${d}')">${d}</span>`).join('');
  h += '<span style="margin-left:12px;font-size:.72rem;color:var(--mt);font-weight:600">Category:</span> ';
  h += `<span class="filter-btn${filterCat === '' ? ' sel' : ''}" onclick="setCat('')">All</span>`;
  h += cats.map(c => `<span class="filter-btn${filterCat === c ? ' sel' : ''}" onclick="setCat('${c}')">${c}</span>`).join('');
  el.innerHTML = h;
}

function setDiff(d) { filterDiff = d; renderFilters(); renderChallenges(); }
function setCat(c) { filterCat = c; renderFilters(); renderChallenges(); }

function renderChallenges() {
  const el = document.getElementById('ch-grid');
  let filtered = challenges;
  if (filterDiff) filtered = filtered.filter(c => c.difficulty === filterDiff);
  if (filterCat) filtered = filtered.filter(c => c.category === filterCat);

  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No challenges match</div></div>';
    return;
  }
  el.innerHTML = filtered.map(c => `
    <div class="ch-card" onclick="showChallenge('${esc(c.id)}')">
      <div class="ch-title">${esc(c.title)}</div>
      <div class="ch-desc">${esc(c.description.split('\n')[0])}</div>
      <div class="ch-meta">
        <span class="tag diff-${c.difficulty}">${c.difficulty}</span>
        <span class="tag cat-tag">${c.category}</span>
        ${(c.tags || []).slice(0, 2).map(t => `<span class="tag cat-tag">${esc(t)}</span>`).join('')}
        <span class="ch-stats">${c.test_count} tests · ${c.visible_test_count} visible</span>
      </div>
    </div>
  `).join('');
}

async function showChallenge(id) {
  try {
    const c = await api('/arena/challenges/' + id);
    const modal = document.getElementById('chModalBody');
    const sigs = c.function_signature || {};
    const tests = c.tests || [];
    const hints = c.hints || [];
    const best = c.best_submissions || [];
    const cstats = c.stats || {};

    modal.innerHTML = `
      <h2>
        <span class="tag diff-${c.difficulty}" style="font-size:.7rem">${c.difficulty}</span>
        ${esc(c.title)}
        <button class="close" onclick="closeModal()">✕</button>
      </h2>
      <div class="subtitle">${c.category} · ${c.test_count} tests (${c.visible_test_count} visible) · ${cstats.attempts || 0} attempts · ${cstats.solves || 0} solves</div>

      <div class="detail-grid">
        <div class="detail-item"><div class="detail-label">Time Limit</div><div class="detail-val">${c.constraints.time_limit_ms}ms</div></div>
        <div class="detail-item"><div class="detail-label">Memory</div><div class="detail-val">${c.constraints.memory_limit_mb}MB</div></div>
        <div class="detail-item"><div class="detail-label">Languages</div><div class="detail-val">${(c.languages || ['python']).join(', ')}</div></div>
        <div class="detail-item"><div class="detail-label">ELO Weight</div><div class="detail-val">${c.elo_weight || 1.0}×</div></div>
      </div>

      <div class="section-title">Problem Statement</div>
      <div class="desc-full">${esc(c.description)}</div>

      ${Object.keys(sigs).length ? `
        <div class="section-title">Function Signatures</div>
        ${Object.entries(sigs).map(([lang, sig]) => `
          <div class="sig-block">
            <div class="sig-lang">${lang}</div>
            <div>def ${sig.name}(${sig.params}) → ${sig.returns}</div>
          </div>
        `).join('')}
      ` : ''}

      ${tests.length ? `
        <div class="section-title">Example Test Cases</div>
        ${tests.map((t, i) => `
          <div class="test-case">
            <div class="test-label">Test ${i + 1}${t.description ? ' — ' + esc(t.description) : ''}</div>
            <div class="test-io">Input: ${esc(JSON.stringify(t.input))}</div>
            <div class="test-io">Expected: ${esc(JSON.stringify(t.expected_output))}</div>
          </div>
        `).join('')}
      ` : ''}

      ${hints.length ? `
        <div class="section-title">Hints</div>
        ${hints.map((h, i) => `<div class="hint">💡 Hint ${i + 1}: ${esc(h)}</div>`).join('')}
      ` : ''}

      ${best.length ? `
        <div class="section-title">Best Submissions</div>
        ${best.map((b, i) => `
          <div class="best-row">
            <div class="best-rank">#${i + 1}</div>
            <div class="best-agent">${esc(b.agent_id)}</div>
            <div class="best-score">${b.score.toFixed(1)}</div>
            <div class="best-time">${b.execution_time_ms.toFixed(0)}ms · ${b.language} · ${ago(b.submitted_at)}</div>
          </div>
        `).join('')}
      ` : ''}
    `;
    document.getElementById('chModal').classList.add('show');
  } catch (e) {
    console.error('challenge detail', e);
  }
}

function closeModal() { document.getElementById('chModal').classList.remove('show'); }

// ── Leaderboard ──────────────────────

function renderLeaderboard() {
  const el = document.getElementById('lb-body');
  if (!leaderboard.length) {
    el.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--mt);padding:40px">No agents on the leaderboard yet</td></tr>';
    return;
  }
  const maxElo = Math.max(...leaderboard.map(a => a.elo), 1200);
  el.innerHTML = leaderboard.map((a, i) => {
    const total = a.wins + a.losses;
    const winRate = total > 0 ? Math.round(a.wins / total * 100) : 0;
    return `<tr>
      <td class="lb-rank">${i + 1}</td>
      <td class="lb-agent">${esc(a.agent_id)}</td>
      <td class="lb-elo">${Math.round(a.elo)} <div class="lb-bar"><div class="lb-bar-fill" style="width:${(a.elo / maxElo * 100).toFixed(0)}%"></div></div></td>
      <td class="lb-solved">${a.challenges_solved}/${a.challenges_attempted}</td>
      <td>${a.wins}W / ${a.losses}L</td>
      <td class="lb-streak">${a.streak > 0 ? '🔥' + a.streak : '-'} ${a.best_streak > 0 ? '(best: ' + a.best_streak + ')' : ''}</td>
      <td>${winRate}%</td>
    </tr>`;
  }).join('');
}

// ── Submissions ──────────────────────

function renderSubmissions() {
  const el = document.getElementById('sub-list');
  const agentFilter = document.getElementById('sub-filter-agent').value.toLowerCase();
  const statusFilter = document.getElementById('sub-filter-status').value;

  let filtered = submissions;
  if (agentFilter) filtered = filtered.filter(s => s.agent_id.toLowerCase().includes(agentFilter));
  if (statusFilter) filtered = filtered.filter(s => s.status === statusFilter);

  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📨</div><div class="empty-text">No submissions yet</div></div>';
    return;
  }

  // Find challenge titles
  const chMap = {};
  challenges.forEach(c => chMap[c.id] = c.title);

  el.innerHTML = filtered.map(s => {
    const statusClass = s.status === 'passed' ? 'passed' : s.status === 'failed' ? 'failed' : 'pending';
    const scoreClass = s.status === 'passed' ? 'pass' : s.status === 'failed' ? 'fail' : 'pend';
    return `<div class="sub-row">
      <div class="sub-status sub-${statusClass}"></div>
      <div class="sub-info">
        <div class="sub-title">${esc(chMap[s.challenge_id] || s.challenge_id)}</div>
        <div class="sub-meta">${esc(s.agent_id)} · ${s.language} · ${s.tests_passed}/${s.tests_total} tests · ${s.execution_time_ms.toFixed(0)}ms · ${ago(s.submitted_at)}</div>
      </div>
      <div class="sub-score ${scoreClass}">${s.score.toFixed(1)}</div>
    </div>`;
  }).join('');
}

// ── Event listeners ──────────────────

document.getElementById('sub-filter-agent').addEventListener('input', renderSubmissions);
document.getElementById('sub-filter-status').addEventListener('change', renderSubmissions);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── SSE for live updates ─────────────

function initSSE() {
  const sse = new EventSource(BASE + '/events');
  sse.addEventListener('connected', () => {
    document.getElementById('sdot').className = 'dot';
  });
  sse.addEventListener('message', e => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'arena_submission') {
        loadSubmissions();
        loadLeaderboard();
        loadStats();
      }
    } catch {}
  });
  sse.onerror = () => {
    document.getElementById('sdot').className = 'dot off';
  };
}

// ── Init ─────────────────────────────

refresh();
initSSE();
</script>
</body>
</html>
